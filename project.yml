name: sokoottann
options:
  bundleIdPrefix: com.sokoottann
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  sokoottann:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    info:
      path: Sources/sokoottann/Info.plist
      properties:
        CFBundleDisplayName: そこいた！
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSBluetoothAlwaysUsageDescription: "近くにいるユーザーを探すためにBluetoothを使用します"
        NSBluetoothPeripheralUsageDescription: "近くにいるユーザーを探すためにBluetoothを使用します"
        NSLocalNetworkUsageDescription: "近くにいるユーザーを見つけるためにローカルネットワークを使用します"
        NSBonjourServices:
          - "_sokoita._tcp"
          - "_sokoita._udp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sokoottann.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: ""
